<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>MelodyVN - Nghe Nhạc Hay</title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      overflow: hidden;

      background: #09090b;

      font-family: sans-serif;

    }

    .song-card {

      transition: all 0.3s;

    }

    .song-card:hover {

      transform: translateY(-8px);

      box-shadow:
        0 20px 25px -5px rgb(0 0 0 / 0.3);

    }

    /* MOBILE */
    @media (max-width: 768px) {

      .song-card:hover {

        transform: none;

      }

    }

  </style>

</head>

<body class="bg-zinc-950 text-white">

  <div class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <div class="hidden md:flex
                w-64 bg-black p-6
                flex-col border-r border-zinc-800 shrink-0">

<h1 id="logo-home" 
    class="text-3xl font-bold text-emerald-500 mb-8 cursor-pointer select-none"
    onclick="goHome()">
  ♪ MelodyVN
</h1>

      <nav class="space-y-6">

        <a
  href="#"
  onclick="showDiscover()"
  class="flex items-center gap-3 text-lg hover:text-emerald-400">

  <i class="fas fa-home"></i>

  Khám phá

</a>

        <a href="#"
           class="flex items-center gap-3
                  text-lg hover:text-emerald-400 transition">
<!-- 
          <i class="fas fa-search"></i> -->

          <!-- <span>Tìm kiếm</span> -->

        </a>
        <a
  href="#"
  onclick="showLibrary()"
  class="flex items-center gap-3 text-lg hover:text-emerald-400">

  <i class="fas fa-heart"></i>
  Thư viện

</a>

      </nav>
<button
  onclick="logout()"
  class="mt-8 w-full bg-red-500 hover:bg-red-400 py-3 rounded-xl font-semibold">

  <i class="fas fa-right-from-bracket mr-2"></i>

  Đăng xuất

</button>
      <!-- UPLOAD -->
      <div class="mt-auto">

        <button onclick="uploadMusic()"
                class="w-full bg-emerald-600
                       hover:bg-emerald-500
                       py-3 rounded-xl
                       font-medium transition">

          + Tải nhạc lên

        </button>

      </div>

    </div>

    <!-- MAIN -->
    <div class="flex-1 overflow-auto pb-44 md:pb-28"
         id="main-content">

      <div class="p-4 md:p-8">

        <!-- MOBILE HEADER -->
        <div class="md:hidden flex items-center justify-between mb-6">

          <h1 class="text-2xl font-bold text-emerald-500">
            ♪ MelodyVN
          </h1>

          <button onclick="uploadMusic()"
                  class="w-11 h-11 rounded-full
                         bg-emerald-500 text-white">

            <i class="fas fa-plus"></i>

          </button>

        </div>

        <!-- TITLE -->
        <div class="flex flex-col md:flex-row
                    md:justify-between
                    md:items-center
                    gap-6 mb-8">

          <div>
<h2 id="greeting-text" class="text-2xl md:text-4xl font-bold mb-2">
  Chào buổi sáng 👋
</h2>

            <p class="text-zinc-400">
              Thưởng thức âm nhạc yêu thích của bạn
            </p>

          </div>

        </div>

        <!-- SONG LIST -->
        <div id="song-list"
             class="grid
                    grid-cols-2
                    sm:grid-cols-2
                    md:grid-cols-3
                    lg:grid-cols-4
                    xl:grid-cols-5
                    gap-4 md:gap-6">

        </div>

      </div>

    </div>

  </div>

  <!-- MOBILE NAV -->
  <div class="md:hidden
              fixed bottom-28 left-0 right-0
              bg-black border-t border-zinc-800
              h-16 flex items-center
              justify-around z-40">

    <button class="flex flex-col items-center
                   text-xs text-emerald-400">

      <i class="fas fa-home text-lg"></i>

      <span>Home</span>

    </button>

    <button class="flex flex-col items-center
                   text-xs text-zinc-400">

      <i class="fas fa-search text-lg"></i>

      <span>Search</span>

    </button>

    <button onclick="uploadMusic()"
            class="w-14 h-14 rounded-full
                   bg-emerald-500 text-white
                   flex items-center justify-center
                   text-2xl -mt-8 shadow-xl">

      <i class="fas fa-plus"></i>

    </button>

    <button class="flex flex-col items-center
                   text-xs text-zinc-400">

      <i class="fas fa-heart text-lg"></i>

      <span>Liked</span>

    </button>

    <button class="flex flex-col items-center
                   text-xs text-zinc-400">

      <i class="fas fa-user text-lg"></i>

      <span>Profile</span>

    </button>

  </div>

  <!-- PLAYER -->
  <div id="player"
       class="fixed bottom-0 left-0 right-0
              bg-zinc-900 border-t border-zinc-700
              h-28 md:h-24
              flex items-center
              px-3 md:px-6
              z-50">

  </div>

  <!-- ADD SONG MODAL -->
   ${JSON.parse(localStorage.getItem('user'))?.role === 'admin' ? `
  <div id="add-song-modal"
       class="fixed inset-0 bg-black/70 hidden
              items-center justify-center z-[999]">

    <div class="bg-zinc-900
                p-6 md:p-8
                rounded-2xl
                w-[92%] max-w-md">

      <h2 class="text-2xl font-bold mb-6">
        Thêm bài hát
      </h2>

      <div class="space-y-4">

        <input id="song-title"
               type="text"
               placeholder="Tên bài hát"
               class="w-full bg-zinc-800
                      p-3 rounded-xl outline-none">

        <input id="song-artist"
               type="text"
               placeholder="Ca sĩ"
               class="w-full bg-zinc-800
                      p-3 rounded-xl outline-none">

        <input id="song-src"
               type="text"
               placeholder="Link MP3 hoặc YouTube"
               class="w-full bg-zinc-800
                      p-3 rounded-xl outline-none">

        <input id="song-cover"
               type="text"
               placeholder="Link ảnh bìa"
               class="w-full bg-zinc-800
                      p-3 rounded-xl outline-none">

      </div>

      <div class="flex justify-end gap-3 mt-6">

        <button onclick="closeAddSongModal()"
                class="px-5 py-2 rounded-xl bg-zinc-700">

          Hủy

        </button>

        <button onclick="submitSong()"
                class="px-5 py-2 rounded-xl bg-emerald-600">

          Thêm

        </button>

      </div>

    </div>

  </div>` : ''}

  <!-- EDIT SONG MODAL -->
  <div id="edit-song-modal"
       class="fixed inset-0 bg-black/70 hidden
              items-center justify-center z-[999]">

    <div class="bg-zinc-900
                p-6 md:p-8
                rounded-2xl
                w-[92%] max-w-md">

      <h2 class="text-2xl font-bold mb-6">
        Chỉnh sửa bài hát
      </h2>

      <div class="space-y-4">

        <input id="edit-song-title"
               type="text"
               placeholder="Tên bài hát"
               class="w-full bg-zinc-800
                      p-3 rounded-xl outline-none">

        <input id="edit-song-artist"
               type="text"
               placeholder="Ca sĩ"
               class="w-full bg-zinc-800
                      p-3 rounded-xl outline-none">

        <input id="edit-song-src"
               type="text"
               placeholder="Link MP3 hoặc YouTube"
               class="w-full bg-zinc-800
                      p-3 rounded-xl outline-none">

        <input id="edit-song-cover"
               type="text"
               placeholder="Link ảnh bìa"
               class="w-full bg-zinc-800
                      p-3 rounded-xl outline-none">

      </div>

      <div class="flex justify-end gap-3 mt-6">

        <button onclick="closeEditSongModal()"
                class="px-5 py-2 rounded-xl bg-zinc-700">

          Hủy

        </button>

        <button onclick="updateSong()"
                class="px-5 py-2 rounded-xl bg-emerald-600">

          Lưu

        </button>

      </div>

    </div>

  </div>

  <!-- YOUTUBE PLAYER -->
  <div id="youtube-player"
       style="
         width:1px;
         height:1px;
         opacity:0;
         position:fixed;
         pointer-events:none;
       ">
  </div>

  <!-- DATA -->
  <script src="js/data.js"></script>

  <!-- YOUTUBE API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <!-- PLAYER -->
  <script src="js/player.js"></script>

  <!-- APP -->
  <script src="js/app.js"></script>
<div
  id="login-modal"
  class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">

  <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md">

    <h2 class="text-3xl font-bold mb-6">
      Đăng nhập
    </h2>

    <input
      id="login-username"
      placeholder="Username"
      class="w-full mb-4 p-4 rounded-xl bg-zinc-800">

    <input
      id="login-password"
      type="password"
      placeholder="Password"
      class="w-full mb-6 p-4 rounded-xl bg-zinc-800">

    <button
      onclick="login()"
      class="w-full bg-emerald-500 py-4 rounded-xl font-bold">

      Đăng nhập

    </button>
    <button
  onclick="showRegister()"
  class="w-full mt-4 bg-zinc-700 hover:bg-zinc-600 py-4 rounded-xl font-bold">

  Tạo tài khoản

</button>

  </div>

</div>
<div
  id="register-modal"
  class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50">

  <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md">

    <h2 class="text-3xl font-bold mb-6">
      Đăng ký tài khoản
    </h2>

    <input
      id="register-username"
      placeholder="Username"
      class="w-full mb-4 p-4 rounded-xl bg-zinc-800">

    <input
      id="register-password"
      
      type="password"
      placeholder="Password"
      class="w-full mb-6 p-4 rounded-xl bg-zinc-800">
    <input
  id="register-confirm-password"
  type="password"
  placeholder="Nhập lại mật khẩu"
  class="w-full mb-6 p-4 rounded-xl bg-zinc-800">
    <button
      onclick="register()"
      class="w-full bg-emerald-500 py-4 rounded-xl font-bold">

      Đăng ký

    </button>

    <button
      onclick="closeRegister()"
      class="w-full mt-4 bg-zinc-700 py-4 rounded-xl">

      Đóng

    </button>

  </div>

</div>
</body>

</html>
