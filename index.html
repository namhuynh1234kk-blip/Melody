<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MelodyVN - Nghe Nhạc Hay</title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #09090b; font-family: sans-serif; overflow: hidden; }
    
    /* Container chính để quản lý scroll */
    .app-container { height: 100vh; display: flex; flex-direction: column; }
    #main-content { flex: 1; overflow-y: auto; }

    .song-card { transition: all 0.3s; }
    .song-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3); }

    @media (max-width: 768px) { .song-card:hover { transform: none; } }

    /* Custom thanh kéo cho mượt như ảnh 633efe.png */
    input[type=range] { accent-color: #10b981; cursor: pointer; }
  </style>
</head>

<body class="bg-zinc-950 text-white">

  <div class="app-container">
    
    <div class="flex flex-1 overflow-hidden">
      <!-- SIDEBAR (Chỉ hiện trên Desktop) -->
      <aside class="hidden md:flex w-64 bg-black p-6 flex-col border-r border-zinc-800 shrink-0">
        <h1 class="text-3xl font-bold text-emerald-500 mb-8 cursor-pointer select-none" onclick="goHome()">
          ♪ MelodyVN
        </h1>
        <nav class="space-y-6">
          <a href="#" onclick="showDiscover()" class="flex items-center gap-3 text-lg hover:text-emerald-400 transition">
            <i class="fas fa-home"></i> Khám phá
          </a>
          <a href="#" onclick="showLibrary()" class="flex items-center gap-3 text-lg hover:text-emerald-400 transition">
            <i class="fas fa-heart"></i> Thư viện
          </a>
        </nav>
        <button onclick="logout()" class="mt-8 w-full bg-red-500 hover:bg-red-400 py-3 rounded-xl font-semibold">
          <i class="fas fa-right-from-bracket mr-2"></i> Đăng xuất
        </button>
        <div class="mt-auto">
          <button onclick="uploadMusic()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-medium transition">
            + Tải nhạc lên
          </button>
        </div>
      </aside>

      <!-- MAIN CONTENT (Vùng cuộn nội dung) -->
      <main id="main-content" class="p-4 md:p-8 pb-32">
        <!-- MOBILE HEADER (Hiện logo trên mobile) -->
        <div class="md:hidden flex items-center justify-between mb-6">
          <h1 class="text-2xl font-bold text-emerald-500">♪ MelodyVN</h1>
          <!-- Badge PRO cho Nhựt -->
          <div class="bg-emerald-500/20 text-emerald-500 px-3 py-1 rounded-full text-xs font-bold border border-emerald-500/30">PRO</div>
        </div>

        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-6 mb-8">
          <div>
            <h2 id="greeting-text" class="text-2xl md:text-4xl font-bold mb-1">Chào buổi sáng 👋</h2>
            <p class="text-zinc-400 text-sm italic">Chào Nhựt, chúc bạn nghe nhạc vui vẻ!</p>
          </div>
        </div>

        <!-- SONG LIST -->
        <div id="song-list" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
          <!-- JS sẽ render bài hát vào đây -->
        </div>
      </main>
    </div>

    <!-- 1. MOBILE NAV (Nằm trên Player) -->
    <nav class="md:hidden bg-black/95 border-t border-zinc-800 h-16 flex items-center justify-around shrink-0 z-40">
      <button class="flex flex-col items-center text-[10px] text-emerald-400">
        <i class="fas fa-home text-lg"></i>
        <span>Home</span>
      </button>
      <button class="flex flex-col items-center text-[10px] text-zinc-500">
        <i class="fas fa-search text-lg"></i>
        <span>Search</span>
      </button>

      <!-- Nút Plus nổi lên theo hình image_639079.png -->
      <button onclick="uploadMusic()" class="w-14 h-14 rounded-full bg-emerald-500 text-black flex items-center justify-center text-2xl -mt-10 shadow-2xl border-[6px] border-[#09090b]">
        <i class="fas fa-plus"></i>
      </button>

      <button class="flex flex-col items-center text-[10px] text-zinc-500">
        <i class="fas fa-heart text-lg"></i>
        <span>Liked</span>
      </button>
      <button class="flex flex-col items-center text-[10px] text-zinc-500">
        <i class="fas fa-user text-lg"></i>
        <span>Profile</span>
      </button>
    </nav>

    <!-- 2. PLAYER (Nằm dưới cùng - Giống image_633efe.png) -->
    <footer id="player" class="bg-zinc-900 border-t border-zinc-800 px-4 py-3 shrink-0 z-50">
      <div class="flex items-center justify-between gap-4">
        <!-- Info -->
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <img id="now-cover" src="https://picsum.photos/200" class="w-12 h-12 rounded-lg object-cover shadow-lg">
          <div class="min-w-0">
            <div id="now-title" class="font-bold text-sm truncate">Chưa phát bài nào</div>
            <div id="now-artist" class="text-xs text-zinc-500 truncate">MelodyVN</div>
          </div>
        </div>

        <!-- Controls (Giữa) -->
        <div class="flex flex-col items-center flex-[2]">
          <div class="flex items-center gap-6 text-xl mb-1">
            <button onclick="prevSong()"><i class="fas fa-step-backward text-zinc-400"></i></button>
            <button id="play-btn" onclick="togglePlay()" class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center">
              <i class="fas fa-play ml-1"></i>
            </button>
            <button onclick="nextSong()"><i class="fas fa-step-forward text-zinc-400"></i></button>
          </div>
          <!-- Thanh thời gian mảnh ở dưới -->
          <div class="w-full flex items-center gap-2 text-[10px] text-zinc-500">
            <span>0:00</span>
            <input type="range" id="progress" class="flex-1 h-1">
            <span>0:00</span>
          </div>
        </div>

        <!-- Phụ trợ (Chỉ hiện trên desktop hoặc ẩn bớt trên mobile) -->
        <div class="hidden sm:flex items-center justify-end gap-4 flex-1">
          <i class="fas fa-volume-up text-zinc-500"></i>
          <input type="range" class="w-20 h-1">
          <i class="fas fa-heart text-zinc-500"></i>
        </div>
      </div>
    </footer>

  </div>

  <!-- MODALS (Giữ nguyên logic của bạn) -->
  <!-- Đã bao gồm code modal trong script app.js cũ của bạn -->

  <script src="js/data.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
